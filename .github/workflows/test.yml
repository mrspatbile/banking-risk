name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install quant-risk-engine
        run: |
          git clone https://github.com/mrspatbile/quant-risk-engine.git ../quant-risk-engine
          pip install -e ../quant-risk-engine

      - name: Install dependencies
        run: pip install -e .[dev,dashboard]

      - name: Run tests
        run: pytest tests/ -v